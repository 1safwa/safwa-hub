<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفوى هنا</title>
<meta name="description" content="بوابة صفوى الرقمية — دليل صفوى وأثر+">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FDFAF4;
    --card:#FFFFFF;
    --sand:#F0EDE4;
    --ink:#2C1A0E;
    --ink-soft:#6B5A47;
    --gold:#C9A24B;
    --emerald:#1A6644;
    --line:rgba(44,26,14,.09);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Tajawal',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:1.6rem 2.2rem;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:9px;
    font-weight:800;
    font-size:1.15rem;
    color:var(--ink);
  }
  .brand .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--emerald);
    box-shadow:0 0 0 4px rgba(26,102,68,.12);
  }
  .topbar .tagline{
    font-size:.8rem;
    color:var(--ink-soft);
  }

  .hero-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:1.5rem 1.5rem 3rem;
  }
  .hero-title{
    font-weight:800;
    font-size:clamp(2rem,5vw,3.2rem);
    text-align:center;
    margin-bottom:.9rem;
    color:var(--ink);
  }
  .hero-title span{color:var(--emerald)}
  .hero-sub{
    font-size:1rem;
    font-weight:400;
    color:var(--ink-soft);
    text-align:center;
    margin-bottom:3.2rem;
    max-width:460px;
    line-height:1.9;
  }

  .gates{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:1.4rem;
    width:100%;
    max-width:900px;
  }
  .gate{
    position:relative;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:20px;
    padding:2.8rem 2rem 2.2rem;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    text-decoration:none;
    color:var(--ink);
    transition:transform .3s ease, box-shadow .3s ease, border-color .3s ease;
    box-shadow:0 1px 3px rgba(44,26,14,.04);
  }
  .gate:hover{
    transform:translateY(-6px);
    box-shadow:0 16px 32px rgba(44,26,14,.09);
  }
  .gate-icon{
    width:56px;height:56px;
    border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    margin-bottom:1.4rem;
    font-size:1.5rem;
  }
  .gate.daleel .gate-icon{background:rgba(201,162,75,.14);color:var(--gold)}
  .gate.athar .gate-icon{background:rgba(26,102,68,.1);color:var(--emerald)}
  .gate-name{
    font-weight:800;
    font-size:1.35rem;
    margin-bottom:.5rem;
  }
  .gate-desc{
    font-size:.88rem;
    font-weight:400;
    color:var(--ink-soft);
    line-height:1.8;
    max-width:230px;
    margin-bottom:1.7rem;
  }
  .gate-cta{
    font-size:.82rem;
    font-weight:700;
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:.65rem 1.5rem;
    border-radius:30px;
    transition:opacity .25s ease;
  }
  .gate.daleel .gate-cta{background:var(--gold);color:#FFFDF7}
  .gate.athar .gate-cta{background:var(--emerald);color:#FDFAF4}
  .gate:hover .gate-cta{opacity:.88}
  .gate-cta i{transition:transform .25s ease}
  .gate:hover .gate-cta i{transform:translateX(-3px)}

  footer{
    text-align:center;
    padding:1.6rem;
    font-size:.78rem;
    color:var(--ink-soft);
  }

  @media(max-width:760px){
    .gates{grid-template-columns:1fr;max-width:380px}
    .hero-title{font-size:1.7rem}
    .hero-sub{margin-bottom:2.2rem}
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand"><span class="dot"></span>صفوى هنا</div>
    <div class="tagline">مدينة صفوى الرقمية</div>
  </div>

  <div class="hero-wrap">
    <h1 class="hero-title">هنا <span>صفوى</span></h1>
    <p class="hero-sub">كل ما تريد معرفته عن صفوى ستجده هنا، والقادم مثير بإذن الله</p>

    <a href="about.html" style="display:inline-flex;align-items:center;gap:6px;font-size:.85rem;font-weight:700;color:var(--emerald);text-decoration:none;border:1px solid rgba(26,102,68,.25);padding:.6rem 1.4rem;border-radius:30px;margin-bottom:2.6rem;transition:background .2s ease" onmouseover="this.style.background='rgba(26,102,68,.06)'" onmouseout="this.style.background='transparent'">نبذة عن صفوى ←</a>

    <div class="gates">
      <a class="gate daleel" href="https://daleel.1safwa.com">
        <div class="gate-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M12 2C8 2 5 5.5 5 9.5c0 5 7 12.5 7 12.5s7-7.5 7-12.5C19 5.5 16 2 12 2z"/>
            <circle cx="12" cy="9.5" r="2.3"/>
          </svg>
        </div>
        <div class="gate-name">دليل صفوى</div>
        <div class="gate-desc">كل ما تحتاج معرفته عن المدينة — أماكنها، خدماتها، ووجهاتها</div>
        <div class="gate-cta">دخول <i>←</i></div>
      </a>

      <a class="gate athar" href="https://athar.1safwa.com">
        <div class="gate-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M12 2l2.8 6.3L21 9.2l-5 4.6L17.2 21 12 17.5 6.8 21 8 13.8l-5-4.6 6.2-.9z"/>
          </svg>
        </div>
        <div class="gate-name">أثر<span style="color:var(--gold)">+</span></div>
        <div class="gate-desc">مبادرة تكريم الطاقات الشابة المنجزة من أبناء صفوى</div>
        <div class="gate-cta">دخول <i>←</i></div>
      </a>
    </div>
  </div>

  <footer>١٤٤٧ هـ — صفوى هنا</footer>

</body>
</html>
